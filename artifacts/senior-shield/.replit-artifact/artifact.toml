kind = "mobile"
previewPath = "/"
title = "SeniorShield"
version = "1.0.0"
id = "artifacts/senior-shield"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22317

[services.development]
run = "pnpm --filter @workspace/senior-shield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/senior-shield", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/senior-shield", "run", "serve" ]

[services.env]
PORT = "22317"
BASE_PATH = "/"
