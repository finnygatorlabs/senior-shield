openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SeniorShield API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: user
    description: User profile and preferences
  - name: voice
    description: Voice assistance operations
  - name: scam
    description: Scam detection operations
  - name: family
    description: Family relationship operations
  - name: alerts
    description: Alerts and notifications
  - name: billing
    description: Subscription and billing
  - name: support
    description: Help and support
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify:
    get:
      operationId: verifyToken
      tags: [auth]
      summary: Verify JWT token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/preferences:
    get:
      operationId: getUserPreferences
      tags: [user]
      summary: Get user preferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: updateUserPreferences
      tags: [user]
      summary: Update user preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesRequest"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  /voice/process-request:
    post:
      operationId: processVoiceRequest
      tags: [voice]
      summary: Process a voice request (text input version)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceTextRequest"
      responses:
        "200":
          description: Voice response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceResponse"

  /voice/history:
    get:
      operationId: getVoiceHistory
      tags: [voice]
      summary: Get voice assistance history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Voice history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/VoiceHistoryItem"
                required:
                  - history

  /scam/analyze:
    post:
      operationId: analyzeScam
      tags: [scam]
      summary: Analyze text for scam indicators
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScamAnalyzeRequest"
      responses:
        "200":
          description: Scam analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScamAnalysisResult"

  /scam/history:
    get:
      operationId: getScamHistory
      tags: [scam]
      summary: Get scam analysis history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Scam history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScamHistoryItem"
                required:
                  - history

  /scam/feedback:
    post:
      operationId: submitScamFeedback
      tags: [scam]
      summary: Submit feedback on scam detection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScamFeedbackRequest"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /family/members:
    get:
      operationId: getFamilyMembers
      tags: [family]
      summary: Get linked family members
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Family members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/FamilyMember"
                required:
                  - members

  /family/add-member:
    post:
      operationId: addFamilyMember
      tags: [family]
      summary: Add a family member
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFamilyMemberRequest"
      responses:
        "200":
          description: Family member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /family/member/{memberId}:
    delete:
      operationId: removeFamilyMember
      tags: [family]
      summary: Remove a family member
      security:
        - bearerAuth: []
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get all alerts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                required:
                  - alerts

  /alerts/{alertId}:
    put:
      operationId: updateAlert
      tags: [alerts]
      summary: Mark alert as read
      security:
        - bearerAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                read:
                  type: boolean
              required:
                - read
      responses:
        "200":
          description: Alert updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get user subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"

  /billing/create-checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Create Stripe checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /support/tickets:
    get:
      operationId: getSupportTickets
      tags: [support]
      summary: Get support tickets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Support tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: "#/components/schemas/SupportTicket"
                required:
                  - tickets

  /support/create-ticket:
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "200":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketResponse"

  /support/faq:
    get:
      operationId: getFaq
      tags: [support]
      summary: Get FAQ items
      responses:
        "200":
          description: FAQ items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FaqItem"
                required:
                  - items

  /admin/metrics:
    get:
      operationId: getAdminMetrics
      tags: [admin]
      summary: Get admin metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMetrics"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        user_type:
          type: string
          enum: [senior, adult_child, staff]
        first_name:
          type: string
        last_name:
          type: string
      required:
        - email
        - password
        - user_type

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user_id:
          type: string
        token:
          type: string
        user_type:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        onboarding_completed:
          type: boolean
      required:
        - user_id
        - token
        - user_type
        - onboarding_completed

    VerifyResponse:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        user_type:
          type: string
      required:
        - user_id
        - email
        - user_type

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        user_type:
          type: string
        onboarding_completed:
          type: boolean
        onboarding_step:
          type: integer
        created_at:
          type: string
      required:
        - id
        - email
        - user_type
        - onboarding_completed

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        onboarding_completed:
          type: boolean
        onboarding_step:
          type: integer

    UserPreferences:
      type: object
      properties:
        preferred_voice:
          type: string
        voice_speed:
          type: number
        voice_volume:
          type: number
        color_scheme:
          type: string
        high_contrast_enabled:
          type: boolean
        font_size:
          type: string
        haptic_feedback:
          type: boolean
        captions_enabled:
          type: boolean
        data_collection_enabled:
          type: boolean
      required:
        - preferred_voice
        - voice_speed
        - voice_volume
        - color_scheme
        - high_contrast_enabled
        - font_size
        - haptic_feedback
        - captions_enabled
        - data_collection_enabled

    UpdatePreferencesRequest:
      type: object
      properties:
        preferred_voice:
          type: string
        voice_speed:
          type: number
        voice_volume:
          type: number
        color_scheme:
          type: string
        high_contrast_enabled:
          type: boolean
        font_size:
          type: string
        haptic_feedback:
          type: boolean
        captions_enabled:
          type: boolean
        data_collection_enabled:
          type: boolean

    VoiceTextRequest:
      type: object
      properties:
        request_text:
          type: string
      required:
        - request_text

    VoiceResponse:
      type: object
      properties:
        request_text:
          type: string
        response_text:
          type: string
        task_category:
          type: string
        success:
          type: boolean
        error_message:
          type: string
        history_id:
          type: string
      required:
        - request_text
        - response_text
        - task_category
        - success

    VoiceHistoryItem:
      type: object
      properties:
        id:
          type: string
        request_text:
          type: string
        response_text:
          type: string
        task_category:
          type: string
        success:
          type: boolean
        created_at:
          type: string
      required:
        - id
        - request_text
        - response_text
        - task_category
        - success
        - created_at

    ScamAnalyzeRequest:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    ScamAnalysisResult:
      type: object
      properties:
        id:
          type: string
        risk_score:
          type: number
        risk_level:
          type: string
          enum: [safe, suspicious, high_risk]
        detected_patterns:
          type: array
          items:
            type: string
        explanation:
          type: string
        analysis_details:
          type: object
      required:
        - id
        - risk_score
        - risk_level
        - detected_patterns
        - explanation

    ScamHistoryItem:
      type: object
      properties:
        id:
          type: string
        extracted_text:
          type: string
        risk_score:
          type: number
        risk_level:
          type: string
        user_feedback:
          type: string
        created_at:
          type: string
      required:
        - id
        - risk_score
        - risk_level
        - created_at

    ScamFeedbackRequest:
      type: object
      properties:
        scam_analysis_id:
          type: string
        feedback_type:
          type: string
          enum: [correct, false_positive, false_negative]
        explanation:
          type: string
      required:
        - scam_analysis_id
        - feedback_type

    FamilyMember:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        relationship:
          type: string
        scam_alerts:
          type: boolean
        weekly_summary:
          type: boolean
        created_at:
          type: string
      required:
        - id
        - email
        - relationship
        - scam_alerts
        - weekly_summary
        - created_at

    AddFamilyMemberRequest:
      type: object
      properties:
        adult_child_email:
          type: string
          format: email
        relationship:
          type: string
      required:
        - adult_child_email
        - relationship

    Alert:
      type: object
      properties:
        id:
          type: string
        alert_type:
          type: string
        message:
          type: string
        read:
          type: boolean
        created_at:
          type: string
      required:
        - id
        - alert_type
        - message
        - read
        - created_at

    SubscriptionInfo:
      type: object
      properties:
        tier:
          type: string
          enum: [free, premium_trial, premium_paid]
        status:
          type: string
        billing_cycle:
          type: string
        trial_end_date:
          type: string
        premium_end_date:
          type: string
      required:
        - tier
        - status

    CheckoutRequest:
      type: object
      properties:
        tier:
          type: string
        billing_cycle:
          type: string
          enum: [monthly, annual]
      required:
        - tier
        - billing_cycle

    CheckoutResponse:
      type: object
      properties:
        checkout_url:
          type: string
      required:
        - checkout_url

    SupportTicket:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        message:
          type: string
        status:
          type: string
        priority:
          type: string
        response:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - subject
        - message
        - status
        - priority
        - created_at

    CreateTicketRequest:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string
      required:
        - subject
        - message

    SupportTicketResponse:
      type: object
      properties:
        success:
          type: boolean
        ticket_id:
          type: string
        status:
          type: string
      required:
        - success
        - ticket_id
        - status

    FaqItem:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        answer:
          type: string
        category:
          type: string
      required:
        - id
        - question
        - answer
        - category

    AdminMetrics:
      type: object
      properties:
        total_users:
          type: integer
        free_users:
          type: integer
        trial_users:
          type: integer
        paid_users:
          type: integer
        daily_active_users:
          type: integer
        voice_requests_count:
          type: integer
        scams_detected:
          type: integer
        family_alerts_sent:
          type: integer
      required:
        - total_users
        - free_users
        - trial_users
        - paid_users
